services:
  redis-1:
    image: redis:8.8.0
    container_name: redis-1
    hostname: redis-1
    command:
      - redis-server
      - --port
      - "7001"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --cluster-announce-hostname
      - "${REDIS_CLUSTER_ANNOUNCE_HOST:?Set REDIS_CLUSTER_ANNOUNCE_HOST to the host IP reachable from Docker}"
      - --cluster-announce-port
      - "7001"
      - --cluster-announce-bus-port
      - "17001"
      - --cluster-preferred-endpoint-type
      - hostname
      - --appendonly
      - "no"
      - --protected-mode
      - "no"
    ports:
      - "7001:7001"
      - "17001:17001"
    networks:
      - redis-cluster

