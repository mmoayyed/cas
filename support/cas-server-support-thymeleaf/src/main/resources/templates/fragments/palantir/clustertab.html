<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
</head>
<body>
<span th:fragment="main">
    <div class="attribute-tab w-100 d-none" id="attribute-tab-15">
        <div class="jqueryui-tabs" id="cluster-tabs">
            <ul>
                <li><a id="clusterTopologyTab" href="#cluster-topology-tab">Cluster Topology</a></li>
                <li><a id="clusterDiscoveryTab" href="#cluster-discovery-tab">Cluster Discovery</a></li>
            </ul>
            <div id="cluster-topology-tab">
                <div id="clusterTopologySummary" class="cluster-topology-summary d-none" aria-label="Cluster topology summary">
                    <span class="cluster-summary-chip cluster-summary-total">
                        <i class="mdi mdi-server" aria-hidden="true"></i>
                        <strong id="clusterTopologyMemberCount">0</strong> members
                    </span>
                    <span class="cluster-summary-chip cluster-summary-healthy">
                        <i class="mdi mdi-check-circle" aria-hidden="true"></i>
                        <strong id="clusterTopologyHealthyCount">0</strong> healthy
                    </span>
                    <span class="cluster-summary-chip cluster-summary-unhealthy">
                        <i class="mdi mdi-alert-circle" aria-hidden="true"></i>
                        <strong id="clusterTopologyUnhealthyCount">0</strong> unhealthy
                    </span>
                    <span class="cluster-summary-chip cluster-summary-owners">
                        <i class="mdi mdi-domain" aria-hidden="true"></i>
                        <strong id="clusterTopologyOwnerCount">0</strong> owners
                    </span>
                </div>

                <div id="clusterTopologyStatus" class="cluster-topology-message" role="status" aria-live="polite">
                    <i class="mdi mdi-loading mdi-spin" aria-hidden="true"></i>
                    Loading cluster topology...
                </div>
                <div id="clusterTopologyOwners" class="cluster-topology-owners" aria-live="polite"></div>
            </div>
            <div id="cluster-discovery-tab">
                
            </div>
        </div>
    </div>
</span>
</body>
</html>
